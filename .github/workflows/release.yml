name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-amd64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm64
            platform: linux-arm64
            target: aarch64-unknown-linux-gnu
          - os: windows-latest
            platform: win-amd64
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            platform: macos-arm64
            target: aarch64-apple-darwin
          - os: macos-13
            platform: macos-x64
            target: x86_64-apple-darwin
            
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          
      - name: Build with Cargo
        run: cargo build --release --target ${{ matrix.target }}
          
      - name: Package Release Asset (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/bili-live-tool.exe", "bili_config.yaml", "bili_cookie.json", "bili_areas.json", "README.md" -DestinationPath "bili-live-tool-${{ matrix.platform }}.zip"
          
      - name: Package Release Asset (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x target/${{ matrix.target }}/release/bili-live-tool
          zip -j "bili-live-tool-${{ matrix.platform }}.zip" target/${{ matrix.target }}/release/bili-live-tool bili_config.yaml bili_cookie.json bili_areas.json README.md
          
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: bili-live-tool-${{ matrix.platform }}.zip
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest-manual-build' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Latest Manual Build' }}
          allowUpdates: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
