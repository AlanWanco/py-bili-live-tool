name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-amd64
          - os: ubuntu-24.04-arm64
            platform: linux-arm64
          - os: windows-latest
            platform: win-amd64
          - os: macos-latest
            platform: macos-arm64
          - os: macos-latest
            platform: macos-x64
            
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          
      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name "bili-live-tool" bili_live_tool.py
          
      - name: Package Release Asset (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path "dist/bili-live-tool.exe", "bili_config.yaml", "bili_cookie.json", "bili_areas.json", "README.md" -DestinationPath "bili-live-tool-${{ matrix.platform }}.zip"
          
      - name: Package Release Asset (Unix)
        if: runner.os != 'Windows'
        run: |
          # 给予执行权限
          chmod +x dist/bili-live-tool
          zip -j "bili-live-tool-${{ matrix.platform }}.zip" dist/bili-live-tool bili_config.yaml bili_cookie.json bili_areas.json README.md
          
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: bili-live-tool-${{ matrix.platform }}.zip
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest-manual-build' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Latest Manual Build' }}
          allowUpdates: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
