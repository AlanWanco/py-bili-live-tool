name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-amd64
            # 使用原生构建，自动识别target
          - os: ubuntu-24.04-arm64
            platform: linux-arm64
          - os: windows-latest
            platform: win-amd64
          - os: macos-14 # Apple Silicon (ARM64)
            platform: macos-arm64
          - os: macos-13 # Intel (x86_64)
            platform: macos-x64
            
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
          
      - name: Build with Cargo
        run: cargo build --release
          
      - name: Debug File Path
        shell: bash
        run: |
          echo "Listing binary directory:"
          ls -la target/release/
          
      - name: Package Release Asset (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path "target/release/bili-live-tool.exe", "bili_config.yaml", "bili_cookie.json", "bili_areas.json", "README.md" -DestinationPath "bili-live-tool-${{ matrix.platform }}.zip"
          
      - name: Package Release Asset (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x target/release/bili-live-tool
          zip -j "bili-live-tool-${{ matrix.platform }}.zip" target/release/bili-live-tool bili_config.yaml bili_cookie.json bili_areas.json README.md
          
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: bili-live-tool-${{ matrix.platform }}.zip
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest-manual-build' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Latest Manual Build' }}
          allowUpdates: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
